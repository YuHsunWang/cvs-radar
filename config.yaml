BRANDS:
  "7-11":
    - "7-11"
    - "711"
    - "7-eleven"
    - "小7"
    - "小七"
    - "seven"
    - "統一超"
  "全家":
    - "全家"
    - "FamilyMart"
    - "family mart"
    - "fami"
  "萊爾富":
    - "萊爾富"
    - "Hi-Life"
    - "hilife"
  "OK":
    - "OK超商"
    - "OKmart"
    - "OK"
  "美聯社":
    - "美聯社"
  "其他": []

CRAWL:
  base_url: "https://www.ptt.cc"
  board: "CVS"
  max_pages: 5
  request_delay_sec: 1.0
  timeout_sec: 10
  retries: 3
  user_agent: "CVS-Radar/0.2 (+https://github.com/local/cvs-radar)"
  cache_path: ".cvs_radar_seen.json"

SENTIMENT:
  backend: "lexicon"
  tag_prior_weight: 0.6
  llm:
    enabled: false
    provider: "openai"
    model: "gpt-4o-mini"
    api_key: ""
    api_key_env: "CVS_RADAR_LLM_API_KEY"
    fallback_backend: "snownlp"

SCORING:
  role_weight:
    author: 1.0
    commenter: 1.0
  prior_mean: 0.5
  prior_strength: 1.0
  # 0.005 ≈ 139-day half-life: stale discussions drift toward the neutral
  # prior instead of weighing forever (chosen from the 2026-07-20 λ sweep).
  time_decay_lambda: 0.005
  per_user_cap: true
  exclude_self_push: true

PRODUCT_NORMALIZATION:
  similarity_threshold: 0.86
  jaccard_threshold: 0.72

PRODUCT_ALIASES:
  "7-11":
    "阜杭饅頭豬排蛋": "阜杭豆漿饅頭夾豬排蛋"

BRAND_COMPARISON:
  comparison_terms:
    - "比較"
    - "比"
    - "還是"
    - "輸"
    - "贏"
    - "勝過"
    - "不如"
    - "屌打"
    - "CP值"
    - "cp值"
    - "沒有"
    - "沒"
  positive_nearby_terms:
    - "好"
    - "好吃"
    - "更好"
    - "較好"
    - "比較好"
    - "比較好吃"
    - "讚"
    - "優"
    - "香"
    - "划算"
    - "便宜"
    - "高"
    - "強"
    - "勝"
    - "贏"
    - "屌打"

SUSPICION:
  min_activity: 5
  weight_floor: 0.1
  feature_weights:
    one_sided: 0.35
    single_brand: 0.20
    extreme: 0.20
    template_like: 0.10
    burst: 0.15
  burst_window_hours: 24
  burst_min_count: 3

SHILL_DETECTION:
  keywords:
    - "業配"
    - "葉配"
  false_positive_contexts:
    - "茶葉"
    - "葉子"
    - "樹葉"
    - "葉菜"
    - "葉片"
  min_comments: 3
  ratio_threshold: 0.25
  post_weight_penalty: 0.3

# Recalibrated 2026-07-20 against the live score distribution (median mean
# 0.56, 90th-pct std 0.26): the old thresholds funneled 69% of products into
# 褒貶不一 and starved 評價兩極 (std almost never reached 0.30).
CONSENSUS:
  n_eff_min: 3.0
  high_mean: 0.68
  low_mean: 0.45
  low_std: 0.25
  high_std: 0.26

CONFIDENCE_BANDS:
  - [3.0, "低"]
  - [8.0, "中"]

