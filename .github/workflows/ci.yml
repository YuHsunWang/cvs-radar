name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pytest ruff
      - name: Run Python tests
        run: python -m pytest -q
      - name: Smoke-test review backfill CLI
        run: python scripts/backfill_reviews.py --help
      - name: Run Ruff
        run: ruff check cvs_radar scripts tests web/build_data.py

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install data-build dependencies
        run: python -m pip install beautifulsoup4 pyyaml
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Rebuild public data
        working-directory: web
        run: npm run build:data
      - name: Run web tests
        working-directory: web
        run: npm test
      - name: Build static site
        working-directory: web
        run: npm run build
