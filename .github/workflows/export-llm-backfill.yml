name: Export LLM History Backfill

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/export_llm_backfill.py"
      - ".github/workflows/export-llm-backfill.yml"

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore private crawl history
        uses: actions/cache@v4
        with:
          path: data/posts.jsonl
          key: cvs-posts-${{ github.run_id }}
          restore-keys: |
            cvs-posts-

      - name: Require crawl history from cache
        run: |
          # posts.jsonl is gitignored and tracked in no branch, so there is no
          # seed fallback: the only source is the cvs-posts-* Actions cache that
          # refresh-data.yml refreshes on every daily run on main. A miss here
          # means that cache has expired or never ran — fail loudly with the fix.
          if [ ! -s data/posts.jsonl ]; then
            echo "::error::No crawl history restored from the cvs-posts-* Actions cache." >&2
            echo "Run refresh-data.yml on main first (or wait for its daily run) to" >&2
            echo "repopulate the cache, then re-run this workflow." >&2
            exit 1
          fi
          echo "Restored $(wc -l < data/posts.jsonl) posts from cache"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Export account-free unlabeled comments
        run: |
          python scripts/export_llm_backfill.py \
            --posts data/posts.jsonl \
            --out artifacts/unlabeled-comments.csv

      - name: Upload private labeling artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-history-backfill-${{ github.run_id }}
          path: artifacts/unlabeled-comments.csv
          if-no-files-found: error
          retention-days: 7
