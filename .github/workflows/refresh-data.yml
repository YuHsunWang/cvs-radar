name: Refresh Live Data

on:
  # Auto-refresh (schedule + push) disabled 2026-07-21: live data is now
  # refreshed by the local cvs-rebackfill pipeline
  # (crawl -> backfill_reviews -> Codex label -> run_pipeline -> strip_profiles
  # -> build_data -> push). Kept as a MANUAL fallback for when the local
  # machine is unavailable.
  workflow_dispatch:
    inputs:
      backfill_reviews:
        description: "Refetch stored PTT articles with missing author review text"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      # Persist the raw crawl history (data/posts.jsonl) across runs WITHOUT
      # committing it — the repo is public and posts.jsonl holds real PTT
      # author handles/comments (see .gitignore "never commit real PTT data").
      # A unique key per run means the cache always saves the freshly-appended
      # posts.jsonl at post-job; restore-keys pulls the most recent prior cache.
      - name: Restore crawl history from cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: data/posts.jsonl
          key: cvs-posts-${{ github.run_id }}
          restore-keys: |
            cvs-posts-

      # First run has no cache: seed the accumulated history once from the
      # ui/mobile-redesign branch (where posts.jsonl is tracked) so the live
      # dataset keeps its existing ~772 products instead of collapsing to a
      # single 10-page window. Non-fatal if the seed is unavailable.
      - name: Seed crawl history on cache miss
        run: |
          if [ ! -f data/posts.jsonl ]; then
            echo "No cached posts.jsonl — seeding from ui/mobile-redesign"
            if git fetch --depth=1 origin ui/mobile-redesign; then
              git show FETCH_HEAD:data/posts.jsonl > data/posts.jsonl \
                && echo "Seeded $(wc -l < data/posts.jsonl) posts" \
                || echo "Seed path missing; starting fresh"
            else
              echo "Seed branch unavailable; starting fresh"
            fi
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Backfill missing author reviews
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.backfill_reviews) }}
        run: python scripts/backfill_reviews.py --delay 0.5

      - name: Crawl, refresh recent comments, and recompute results
        run: python crawl_job.py --pages 10 --refresh-recent-days 30 --verbose

      - name: Remove account profiles from published results
        run: python scripts/strip_profiles.py data/results.json

      - name: Build public data
        run: python web/build_data.py

      # Commit ONLY the de-identified published artifacts. data/posts.jsonl is
      # gitignored and deliberately never staged — it lives only in the cache.
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.json web/public/data.json
          git diff --cached --quiet && echo "No new data" && exit 0
          git commit -m "chore: refresh live data $(date -u +%Y-%m-%d)"
          git push origin HEAD:main
