name: Scheduled Crawl

on:
  schedule:
    - cron: "0 0 * * *"   # UTC 00:00 = 台灣 08:00
  workflow_dispatch:       # 手動觸發

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run crawler
        run: python crawl_job.py --pages 10 --verbose

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posts.jsonl data/results.json
          git diff --cached --quiet && echo "No new data" && exit 0
          git commit -m "chore: update crawl data $(date -u +%Y-%m-%d)"
          git push
